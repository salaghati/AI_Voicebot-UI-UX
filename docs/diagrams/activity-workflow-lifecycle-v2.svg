<svg xmlns="http://www.w3.org/2000/svg" width="1560" height="1080" viewBox="0 0 1560 1080" role="img" aria-labelledby="title desc">
  <title id="title">Activity workflow lifecycle</title>
  <desc id="desc">Swimlane activity diagram for workflow design, preview, and publish.</desc>
  <defs>
    <style>
      .bg { fill: #f4f7fb; }
      .border { stroke: #b8c6d8; stroke-width: 2; }
      .lane1 { fill: #fdfefe; }
      .lane2 { fill: #f6f9ff; }
      .lane3 { fill: #fdfefe; }
      .title { font: 700 30px Arial, sans-serif; fill: #173a66; }
      .subtitle { font: 400 17px Arial, sans-serif; fill: #60758d; }
      .lane-title { font: 700 21px Arial, sans-serif; fill: #173a66; }
      .box { fill: #eaf3ff; stroke: #2d6cb3; stroke-width: 2.2; rx: 14; ry: 14; }
      .decision { fill: #fff6d9; stroke: #cc9a06; stroke-width: 2.2; }
      .text { font: 600 17px Arial, sans-serif; fill: #16324f; }
      .small { font: 600 15px Arial, sans-serif; fill: #6c7e92; }
      .line { stroke: #4c647c; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .start { fill: #1d4f91; }
      .end1 { fill: #ffffff; stroke: #1d4f91; stroke-width: 3; }
      .end2 { fill: #1d4f91; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#4c647c"/>
    </marker>
  </defs>
  <rect class="bg" width="1560" height="1080"/>
  <text class="title" x="780" y="55" text-anchor="middle">Activity Diagram: Thiết kế, preview và publish workflow</text>
  <text class="subtitle" x="780" y="85" text-anchor="middle">Swimlane thể hiện vòng đời một workflow từ lúc chỉnh sửa đến lúc sẵn sàng dùng</text>

  <rect class="lane1 border" x="70" y="120" width="360" height="900"/>
  <rect class="lane2 border" x="430" y="120" width="500" height="900"/>
  <rect class="lane3 border" x="930" y="120" width="560" height="900"/>
  <text class="lane-title" x="250" y="155" text-anchor="middle">Admin</text>
  <text class="lane-title" x="680" y="155" text-anchor="middle">Workflow Console</text>
  <text class="lane-title" x="1210" y="155" text-anchor="middle">Workflow Engine / Preview / Versioning</text>

  <circle class="start" cx="250" cy="205" r="16"/>
  <rect class="box" x="140" y="245" width="220" height="64"/>
  <text class="text" x="250" y="284" text-anchor="middle">Mở workflow hoặc tạo mới</text>

  <rect class="box" x="560" y="245" width="240" height="64"/>
  <text class="text" x="680" y="284" text-anchor="middle">Hiển thị canvas và panel</text>

  <rect class="box" x="130" y="365" width="240" height="78"/>
  <text class="text" x="250" y="397" text-anchor="middle">Thêm hoặc sửa node:</text>
  <text class="text" x="250" y="421" text-anchor="middle">Intent, Condition, API, KB</text>

  <rect class="box" x="545" y="365" width="270" height="78"/>
  <text class="text" x="680" y="397" text-anchor="middle">Cập nhật vị trí node, quan hệ</text>
  <text class="text" x="680" y="421" text-anchor="middle">và properties</text>

  <rect class="box" x="1090" y="365" width="240" height="78"/>
  <text class="text" x="1210" y="397" text-anchor="middle">Chuẩn hóa graph workflow</text>
  <text class="text" x="1210" y="421" text-anchor="middle">để lưu được</text>

  <rect class="box" x="155" y="510" width="190" height="64"/>
  <text class="text" x="250" y="549" text-anchor="middle">Lưu draft</text>

  <rect class="box" x="550" y="510" width="260" height="64"/>
  <text class="text" x="680" y="549" text-anchor="middle">Gửi yêu cầu lưu version nháp</text>

  <rect class="box" x="1080" y="510" width="260" height="64"/>
  <text class="text" x="1210" y="549" text-anchor="middle">Tạo version và snapshot logic</text>

  <rect class="box" x="110" y="645" width="280" height="72"/>
  <text class="text" x="250" y="685" text-anchor="middle">Mở preview session, conversation</text>

  <rect class="box" x="535" y="645" width="290" height="72"/>
  <text class="text" x="680" y="685" text-anchor="middle">Khởi chạy preview từ workflow hiện tại</text>

  <rect class="box" x="1060" y="645" width="300" height="72"/>
  <text class="text" x="1210" y="685" text-anchor="middle">Sinh transcript, log node và API log</text>

  <polygon class="decision" points="680,780 760,840 680,900 600,840"/>
  <text class="text" x="680" y="832" text-anchor="middle">Preview</text>
  <text class="text" x="680" y="856" text-anchor="middle">đã ổn?</text>

  <rect class="box" x="145" y="804" width="210" height="72"/>
  <text class="text" x="250" y="844" text-anchor="middle">Quay lại chỉnh sửa</text>

  <rect class="box" x="145" y="935" width="210" height="64"/>
  <text class="text" x="250" y="974" text-anchor="middle">Bấm publish</text>

  <rect class="box" x="1080" y="935" width="260" height="64"/>
  <text class="text" x="1210" y="974" text-anchor="middle">Kích hoạt workflow để sử dụng</text>

  <circle class="end1" cx="1210" cy="1035" r="18"/>
  <circle class="end2" cx="1210" cy="1035" r="10"/>

  <path class="line" d="M250 221 L250 245"/>
  <path class="line" d="M360 277 L560 277"/>
  <path class="line" d="M680 309 L680 365"/>
  <path class="line" d="M815 404 L1090 404"/>
  <path class="line" d="M1210 443 L1210 480 L250 480 L250 510"/>
  <path class="line" d="M345 542 L550 542"/>
  <path class="line" d="M810 542 L1080 542"/>
  <path class="line" d="M1210 574 L1210 620 L250 620 L250 645"/>
  <path class="line" d="M390 681 L535 681"/>
  <path class="line" d="M825 681 L1060 681"/>
  <path class="line" d="M1210 717 L1210 750 L680 750 L680 780"/>
  <path class="line" d="M600 840 L355 840"/>
  <path class="line" d="M250 876 L250 900 L680 900"/>
  <path class="line" d="M680 900 L680 935 L250 935"/>
  <path class="line" d="M355 967 L1080 967"/>
  <path class="line" d="M1210 999 L1210 1017"/>
  <text class="small" x="560" y="830">Chưa</text>
  <text class="small" x="775" y="830">Rồi</text>
</svg>
