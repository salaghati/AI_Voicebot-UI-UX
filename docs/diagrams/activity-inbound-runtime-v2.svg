<svg xmlns="http://www.w3.org/2000/svg" width="1620" height="1160" viewBox="0 0 1620 1160" role="img" aria-labelledby="title desc">
  <title id="title">Activity inbound runtime</title>
  <desc id="desc">Swimlane activity diagram for inbound call processing.</desc>
  <defs>
    <style>
      .bg { fill: #f4f7fb; }
      .laneA { fill: #fdfefe; }
      .laneB { fill: #f6f9ff; }
      .laneC { fill: #fdfefe; }
      .laneD { fill: #f6f9ff; }
      .border { stroke: #b8c6d8; stroke-width: 2; }
      .title { font: 700 30px Arial, sans-serif; fill: #173a66; }
      .subtitle { font: 400 17px Arial, sans-serif; fill: #60758d; }
      .lane-title { font: 700 21px Arial, sans-serif; fill: #173a66; }
      .box { fill: #eaf3ff; stroke: #2d6cb3; stroke-width: 2.2; rx: 14; ry: 14; }
      .decision { fill: #fff6d9; stroke: #cc9a06; stroke-width: 2.2; }
      .text { font: 600 17px Arial, sans-serif; fill: #16324f; }
      .small { font: 600 15px Arial, sans-serif; fill: #6c7e92; }
      .line { stroke: #4c647c; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .start { fill: #1d4f91; }
      .end1 { fill: #ffffff; stroke: #1d4f91; stroke-width: 3; }
      .end2 { fill: #1d4f91; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#4c647c"/>
    </marker>
  </defs>
  <rect class="bg" width="1620" height="1160"/>
  <text class="title" x="810" y="55" text-anchor="middle">Activity Diagram: Xử lý một cuộc gọi inbound</text>
  <text class="subtitle" x="810" y="85" text-anchor="middle">Swimlane thể hiện trải nghiệm của khách hàng, voice platform, workflow engine và agent</text>

  <rect class="laneA border" x="50" y="120" width="300" height="970"/>
  <rect class="laneB border" x="350" y="120" width="360" height="970"/>
  <rect class="laneC border" x="710" y="120" width="430" height="970"/>
  <rect class="laneD border" x="1140" y="120" width="430" height="970"/>
  <text class="lane-title" x="200" y="155" text-anchor="middle">Khách hàng</text>
  <text class="lane-title" x="530" y="155" text-anchor="middle">Voice Platform</text>
  <text class="lane-title" x="925" y="155" text-anchor="middle">Workflow Engine / KB / API</text>
  <text class="lane-title" x="1355" y="155" text-anchor="middle">Agent</text>

  <circle class="start" cx="200" cy="205" r="16"/>
  <rect class="box" x="85" y="245" width="230" height="64"/>
  <text class="text" x="200" y="284" text-anchor="middle">Gọi vào hotline</text>

  <rect class="box" x="410" y="245" width="240" height="64"/>
  <text class="text" x="530" y="284" text-anchor="middle">Xác định số gọi vào và route</text>

  <rect class="box" x="790" y="245" width="270" height="64"/>
  <text class="text" x="925" y="284" text-anchor="middle">Nạp workflow, KB và rule xử lý</text>

  <rect class="box" x="410" y="355" width="240" height="64"/>
  <text class="text" x="530" y="394" text-anchor="middle">Phát lời chào của bot</text>

  <rect class="box" x="85" y="355" width="230" height="64"/>
  <text class="text" x="200" y="394" text-anchor="middle">Trình bày nhu cầu</text>

  <rect class="box" x="410" y="465" width="240" height="64"/>
  <text class="text" x="530" y="504" text-anchor="middle">Chuyển audio thành text</text>

  <rect class="box" x="790" y="465" width="270" height="64"/>
  <text class="text" x="925" y="504" text-anchor="middle">Nhận diện intent và entity</text>

  <polygon class="decision" points="925,585 1005,645 925,705 845,645"/>
  <text class="text" x="925" y="638" text-anchor="middle">Bot có</text>
  <text class="text" x="925" y="662" text-anchor="middle">tự xử lý được?</text>

  <rect class="box" x="785" y="765" width="280" height="72"/>
  <text class="text" x="925" y="805" text-anchor="middle">Tra KB hoặc gọi API để lấy dữ liệu</text>

  <rect class="box" x="410" y="875" width="240" height="72"/>
  <text class="text" x="530" y="915" text-anchor="middle">Phát phản hồi cho khách hàng</text>

  <rect class="box" x="85" y="875" width="230" height="72"/>
  <text class="text" x="200" y="915" text-anchor="middle">Nghe phản hồi và kết thúc</text>

  <rect class="box" x="1220" y="765" width="270" height="72"/>
  <text class="text" x="1355" y="805" text-anchor="middle">Tiếp nhận handover và xử lý</text>

  <rect class="box" x="1220" y="875" width="270" height="72"/>
  <text class="text" x="1355" y="915" text-anchor="middle">Cập nhật kết quả cuộc gọi</text>

  <circle class="end1" cx="200" cy="1015" r="18"/>
  <circle class="end2" cx="200" cy="1015" r="10"/>

  <circle class="end1" cx="1355" cy="1015" r="18"/>
  <circle class="end2" cx="1355" cy="1015" r="10"/>

  <path class="line" d="M200 221 L200 245"/>
  <path class="line" d="M315 277 L410 277"/>
  <path class="line" d="M650 277 L790 277"/>
  <path class="line" d="M925 309 L925 330 L530 330 L530 355"/>
  <path class="line" d="M410 387 L315 387"/>
  <path class="line" d="M200 419 L200 445 L530 445 L530 465"/>
  <path class="line" d="M650 497 L790 497"/>
  <path class="line" d="M925 529 L925 585"/>
  <path class="line" d="M925 705 L925 765"/>
  <path class="line" d="M1005 645 L1220 645 L1220 765"/>
  <path class="line" d="M925 837 L925 860 L530 860 L530 875"/>
  <path class="line" d="M410 911 L315 911"/>
  <path class="line" d="M200 947 L200 997"/>
  <path class="line" d="M1355 837 L1355 875"/>
  <path class="line" d="M1355 947 L1355 997"/>
  <text class="small" x="1025" y="635">Không</text>
  <text class="small" x="940" y="735">Có</text>
</svg>
