<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="860" viewBox="0 0 1400 860" role="img" aria-labelledby="title desc">
  <title id="title">Use case overview</title>
  <desc id="desc">Use case diagram with two actors: Admin and Agent. Actions are shown as rectangles inside the AI Voicebot Ops Console system boundary.</desc>
  <defs>
    <style>
      .bg { fill: #f5f7fb; }
      .boundary { fill: #ffffff; stroke: #1f4e8c; stroke-width: 3; rx: 24; ry: 24; }
      .boundary-title { font: 700 28px Arial, sans-serif; fill: #123a6b; }
      .section-note { font: 400 16px Arial, sans-serif; fill: #4d647c; }
      .label { font: 700 22px Arial, sans-serif; fill: #16324f; }
      .actor-line { stroke: #16324f; stroke-width: 4; stroke-linecap: round; }
      .action-box { fill: #ecf4ff; stroke: #2d6cb3; stroke-width: 2.5; rx: 14; ry: 14; }
      .action-text { font: 600 18px Arial, sans-serif; fill: #16324f; }
      .connector { stroke: #6b7f95; stroke-width: 2.5; fill: none; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="860"/>

  <rect class="boundary" x="300" y="60" width="800" height="730"/>
  <text class="boundary-title" x="700" y="105" text-anchor="middle">AI Voicebot Ops Console</text>
  <text class="section-note" x="700" y="132" text-anchor="middle">Use case cấp quản trị, rút gọn còn 2 actor: Admin và Agent</text>

  <circle class="actor-line" cx="135" cy="180" r="28" fill="none"/>
  <line class="actor-line" x1="135" y1="208" x2="135" y2="305"/>
  <line class="actor-line" x1="92" y1="240" x2="178" y2="240"/>
  <line class="actor-line" x1="135" y1="305" x2="96" y2="365"/>
  <line class="actor-line" x1="135" y1="305" x2="174" y2="365"/>
  <text class="label" x="135" y="415" text-anchor="middle">Admin</text>

  <circle class="actor-line" cx="1265" cy="250" r="28" fill="none"/>
  <line class="actor-line" x1="1265" y1="278" x2="1265" y2="375"/>
  <line class="actor-line" x1="1222" y1="310" x2="1308" y2="310"/>
  <line class="actor-line" x1="1265" y1="375" x2="1226" y2="435"/>
  <line class="actor-line" x1="1265" y1="375" x2="1304" y2="435"/>
  <text class="label" x="1265" y="485" text-anchor="middle">Agent</text>

  <rect class="action-box" x="380" y="180" width="280" height="78"/>
  <text class="action-text" x="520" y="226" text-anchor="middle">Quản lý campaign outbound</text>

  <rect class="action-box" x="740" y="180" width="280" height="78"/>
  <text class="action-text" x="880" y="226" text-anchor="middle">Thiết lập inbound route</text>

  <rect class="action-box" x="380" y="300" width="280" height="78"/>
  <text class="action-text" x="520" y="346" text-anchor="middle">Thiết kế và publish workflow</text>

  <rect class="action-box" x="740" y="300" width="280" height="78"/>
  <text class="action-text" x="880" y="346" text-anchor="middle">Quản lý KB và fallback</text>

  <rect class="action-box" x="380" y="420" width="280" height="78"/>
  <text class="action-text" x="520" y="466" text-anchor="middle">Theo dõi dashboard và report</text>

  <rect class="action-box" x="740" y="420" width="280" height="78"/>
  <text class="action-text" x="880" y="466" text-anchor="middle">Cấu hình hệ thống và phân quyền</text>

  <rect class="action-box" x="440" y="560" width="260" height="78"/>
  <text class="action-text" x="570" y="606" text-anchor="middle">Xem transcript và log</text>

  <rect class="action-box" x="720" y="560" width="260" height="78"/>
  <text class="action-text" x="850" y="606" text-anchor="middle">Nhận handover cuộc gọi</text>

  <path class="connector" d="M 185 220 C 250 220, 300 220, 380 220"/>
  <path class="connector" d="M 185 245 C 250 250, 300 320, 380 338"/>
  <path class="connector" d="M 185 270 C 250 300, 300 455, 380 458"/>
  <path class="connector" d="M 185 295 C 250 345, 300 600, 440 598"/>
  <path class="connector" d="M 185 235 C 300 235, 620 220, 740 220"/>
  <path class="connector" d="M 185 255 C 300 270, 620 338, 740 338"/>
  <path class="connector" d="M 185 285 C 300 340, 620 458, 740 458"/>

  <path class="connector" d="M 1215 310 C 1140 310, 1080 585, 980 598"/>
  <path class="connector" d="M 1215 335 C 1140 360, 1080 620, 700 598"/>
</svg>
