<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1120" viewBox="0 0 1600 1120" role="img" aria-labelledby="title desc">
  <title id="title">Activity outbound campaign</title>
  <desc id="desc">Swimlane activity diagram for outbound campaign setup.</desc>
  <defs>
    <style>
      .bg { fill: #f4f7fb; }
      .lane1 { fill: #fdfefe; }
      .lane2 { fill: #f6f9ff; }
      .lane3 { fill: #fdfefe; }
      .border { stroke: #b8c6d8; stroke-width: 2; }
      .title { font: 700 30px Arial, sans-serif; fill: #173a66; }
      .subtitle { font: 400 17px Arial, sans-serif; fill: #60758d; }
      .lane-title { font: 700 21px Arial, sans-serif; fill: #173a66; }
      .box { fill: #eaf3ff; stroke: #2d6cb3; stroke-width: 2.2; rx: 14; ry: 14; }
      .decision { fill: #fff6d9; stroke: #cc9a06; stroke-width: 2.2; }
      .text { font: 600 17px Arial, sans-serif; fill: #16324f; }
      .small { font: 600 15px Arial, sans-serif; fill: #6c7e92; }
      .line { stroke: #4c647c; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .start { fill: #1d4f91; }
      .end1 { fill: #ffffff; stroke: #1d4f91; stroke-width: 3; }
      .end2 { fill: #1d4f91; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#4c647c"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="1120"/>
  <text class="title" x="800" y="55" text-anchor="middle">Activity Diagram: Tạo và cấu hình campaign outbound</text>
  <text class="subtitle" x="800" y="85" text-anchor="middle">Swimlane tách rõ thao tác của Admin, giao diện console và xử lý hệ thống</text>

  <rect class="lane1 border" x="70" y="120" width="420" height="930"/>
  <rect class="lane2 border" x="490" y="120" width="480" height="930"/>
  <rect class="lane3 border" x="970" y="120" width="560" height="930"/>
  <text class="lane-title" x="280" y="155" text-anchor="middle">Admin</text>
  <text class="lane-title" x="730" y="155" text-anchor="middle">AI Voicebot Portal</text>
  <text class="lane-title" x="1250" y="155" text-anchor="middle">System / Workflow / KB / Fallback</text>

  <circle class="start" cx="280" cy="205" r="16"/>
  <rect class="box" x="170" y="245" width="220" height="64"/>
  <text class="text" x="280" y="284" text-anchor="middle">Mở màn hình tạo campaign</text>

  <rect class="box" x="590" y="245" width="280" height="64"/>
  <text class="text" x="730" y="284" text-anchor="middle">Hiển thị wizard nhiều bước</text>

  <rect class="box" x="150" y="360" width="260" height="78"/>
  <text class="text" x="280" y="392" text-anchor="middle">Nhập tên campaign, mô tả,</text>
  <text class="text" x="280" y="416" text-anchor="middle">nguồn dữ liệu và lịch gọi</text>

  <rect class="box" x="580" y="360" width="300" height="78"/>
  <text class="text" x="730" y="392" text-anchor="middle">Yêu cầu danh sách workflow, KB</text>
  <text class="text" x="730" y="416" text-anchor="middle">và fallback khả dụng</text>

  <rect class="box" x="1110" y="360" width="280" height="78"/>
  <text class="text" x="1250" y="392" text-anchor="middle">Trả danh sách reference</text>
  <text class="text" x="1250" y="416" text-anchor="middle">cho outbound campaign</text>

  <rect class="box" x="150" y="500" width="260" height="78"/>
  <text class="text" x="280" y="532" text-anchor="middle">Chọn workflow, KB</text>
  <text class="text" x="280" y="556" text-anchor="middle">và fallback phù hợp</text>

  <rect class="box" x="580" y="500" width="300" height="78"/>
  <text class="text" x="730" y="532" text-anchor="middle">Tổng hợp dữ liệu review</text>
  <text class="text" x="730" y="556" text-anchor="middle">trước khi tạo campaign</text>

  <polygon class="decision" points="730,640 810,700 730,760 650,700"/>
  <text class="text" x="730" y="692" text-anchor="middle">Dữ liệu</text>
  <text class="text" x="730" y="716" text-anchor="middle">đã hợp lệ?</text>

  <rect class="box" x="145" y="650" width="270" height="72"/>
  <text class="text" x="280" y="690" text-anchor="middle">Bổ sung hoặc sửa trường</text>

  <rect class="box" x="1085" y="650" width="330" height="72"/>
  <text class="text" x="1250" y="690" text-anchor="middle">Kiểm tra ràng buộc và tính sẵn sàng</text>

  <rect class="box" x="170" y="825" width="220" height="64"/>
  <text class="text" x="280" y="864" text-anchor="middle">Bấm tạo campaign</text>

  <rect class="box" x="590" y="825" width="280" height="64"/>
  <text class="text" x="730" y="864" text-anchor="middle">Gửi yêu cầu lưu campaign</text>

  <rect class="box" x="1090" y="825" width="320" height="64"/>
  <text class="text" x="1250" y="864" text-anchor="middle">Lưu campaign với reference đã chọn</text>

  <rect class="box" x="590" y="940" width="280" height="64"/>
  <text class="text" x="730" y="979" text-anchor="middle">Hiển thị trạng thái tạo thành công</text>

  <circle class="end1" cx="730" cy="1035" r="18"/>
  <circle class="end2" cx="730" cy="1035" r="10"/>

  <path class="line" d="M280 221 L280 245"/>
  <path class="line" d="M390 277 L590 277"/>
  <path class="line" d="M730 309 L730 360"/>
  <path class="line" d="M880 399 L1110 399"/>
  <path class="line" d="M1250 438 L1250 470 L280 470 L280 500"/>
  <path class="line" d="M410 539 L580 539"/>
  <path class="line" d="M730 578 L730 640"/>
  <path class="line" d="M650 700 L415 700"/>
  <path class="line" d="M280 722 L280 760 L730 760"/>
  <path class="line" d="M810 700 L1085 700"/>
  <path class="line" d="M1250 722 L1250 790 L280 790 L280 825"/>
  <path class="line" d="M390 857 L590 857"/>
  <path class="line" d="M870 857 L1090 857"/>
  <path class="line" d="M1250 889 L1250 940 L870 940"/>
  <path class="line" d="M730 1004 L730 1017"/>
  <text class="small" x="535" y="688">Chưa</text>
  <text class="small" x="845" y="688">Rồi</text>
</svg>
