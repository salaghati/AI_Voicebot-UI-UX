<svg width="1400" height="980" viewBox="0 0 1400 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1400" height="980" rx="32" fill="#F5F8FC"/>
  <rect x="24" y="24" width="1352" height="932" rx="28" fill="#FFFFFF" stroke="#D6E0EC" stroke-width="2"/>

  <text x="56" y="84" fill="#1F2D3D" font-family="Arial, sans-serif" font-size="28" font-weight="700">Bản đồ module: mỗi khối dùng để làm gì</text>
  <text x="56" y="120" fill="#5B6B80" font-family="Arial, sans-serif" font-size="18">Mục này thay cho việc mô tả dài từng module. Người đọc có thể nhìn hình trước, rồi chỉ đọc vài dòng ngắn nếu cần.</text>

  <rect x="56" y="170" width="628" height="344" rx="24" fill="#F7FAFE" stroke="#C9D6E6" stroke-width="2"/>
  <text x="88" y="218" fill="#1E3A5F" font-family="Arial, sans-serif" font-size="22" font-weight="700">Nhóm cấu hình và thiết kế</text>

  <rect x="88" y="258" width="180" height="100" rx="18" fill="#EAF3FF" stroke="#9CC2F2" stroke-width="2"/>
  <text x="116" y="300" fill="#1C4E89" font-family="Arial, sans-serif" font-size="19" font-weight="700">Bot Engine</text>
  <text x="116" y="330" fill="#4A6787" font-family="Arial, sans-serif" font-size="16">Tạo outbound / inbound</text>
  <text x="116" y="354" fill="#4A6787" font-family="Arial, sans-serif" font-size="16">theo context business</text>

  <rect x="280" y="258" width="180" height="100" rx="18" fill="#EAF3FF" stroke="#9CC2F2" stroke-width="2"/>
  <text x="308" y="300" fill="#1C4E89" font-family="Arial, sans-serif" font-size="19" font-weight="700">Workflow</text>
  <text x="308" y="330" fill="#4A6787" font-family="Arial, sans-serif" font-size="16">Thiết kế logic bot</text>
  <text x="308" y="354" fill="#4A6787" font-family="Arial, sans-serif" font-size="16">và version dùng chung</text>

  <rect x="472" y="258" width="180" height="100" rx="18" fill="#EAF3FF" stroke="#9CC2F2" stroke-width="2"/>
  <text x="500" y="300" fill="#1C4E89" font-family="Arial, sans-serif" font-size="19" font-weight="700">Knowledge Base</text>
  <text x="500" y="330" fill="#4A6787" font-family="Arial, sans-serif" font-size="16">Quản lý tri thức</text>
  <text x="500" y="354" fill="#4A6787" font-family="Arial, sans-serif" font-size="16">và fallback</text>

  <rect x="88" y="388" width="564" height="90" rx="18" fill="#FFFFFF" stroke="#BFD0E3" stroke-width="2"/>
  <text x="116" y="426" fill="#28486E" font-family="Arial, sans-serif" font-size="18" font-weight="700">Cách hiểu đúng</text>
  <text x="116" y="456" fill="#4D647C" font-family="Arial, sans-serif" font-size="16">Bot Engine là nơi bắt đầu từ nhu cầu business. Workflow là nơi giữ logic. KB là lớp tri thức và fallback cho logic đó.</text>

  <rect x="716" y="170" width="628" height="344" rx="24" fill="#F7FAFE" stroke="#C9D6E6" stroke-width="2"/>
  <text x="748" y="218" fill="#1E3A5F" font-family="Arial, sans-serif" font-size="22" font-weight="700">Nhóm điều hành và theo dõi</text>

  <rect x="748" y="258" width="180" height="100" rx="18" fill="#EDF7F1" stroke="#91C9A9" stroke-width="2"/>
  <text x="776" y="300" fill="#24563A" font-family="Arial, sans-serif" font-size="19" font-weight="700">Dashboard</text>
  <text x="776" y="330" fill="#4B6B58" font-family="Arial, sans-serif" font-size="16">Nhìn sức khỏe vận hành</text>
  <text x="776" y="354" fill="#4B6B58" font-family="Arial, sans-serif" font-size="16">ở mức tổng quan</text>

  <rect x="940" y="258" width="180" height="100" rx="18" fill="#EDF7F1" stroke="#91C9A9" stroke-width="2"/>
  <text x="968" y="300" fill="#24563A" font-family="Arial, sans-serif" font-size="19" font-weight="700">Reports</text>
  <text x="968" y="330" fill="#4B6B58" font-family="Arial, sans-serif" font-size="16">Đo hiệu quả, lỗi,</text>
  <text x="968" y="354" fill="#4B6B58" font-family="Arial, sans-serif" font-size="16">chi tiết cuộc gọi</text>

  <rect x="1132" y="258" width="180" height="100" rx="18" fill="#EDF7F1" stroke="#91C9A9" stroke-width="2"/>
  <text x="1160" y="300" fill="#24563A" font-family="Arial, sans-serif" font-size="19" font-weight="700">Preview</text>
  <text x="1160" y="330" fill="#4B6B58" font-family="Arial, sans-serif" font-size="16">Mô phỏng transcript</text>
  <text x="1160" y="354" fill="#4B6B58" font-family="Arial, sans-serif" font-size="16">và technical log</text>

  <rect x="748" y="388" width="564" height="90" rx="18" fill="#FFFFFF" stroke="#BFD0E3" stroke-width="2"/>
  <text x="776" y="426" fill="#28486E" font-family="Arial, sans-serif" font-size="18" font-weight="700">Cách hiểu đúng</text>
  <text x="776" y="456" fill="#4D647C" font-family="Arial, sans-serif" font-size="16">Đây là nơi người quản lý và QA đọc kết quả sau khi bot đã được cấu hình, thay vì nơi tạo cấu hình ban đầu.</text>

  <rect x="56" y="548" width="1288" height="276" rx="24" fill="url(#settingsPanel)" stroke="#2D6DC4" stroke-width="2"/>
  <text x="88" y="604" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="22" font-weight="700">Nhóm cấu hình nền tảng</text>
  <text x="88" y="636" fill="#DDEBFF" font-family="Arial, sans-serif" font-size="17">Settings không phải nơi bắt đầu demo, nhưng là lớp cấu hình nền giúp platform chạy được trên nhiều tenant.</text>

  <rect x="88" y="674" width="172" height="90" rx="16" fill="#FFFFFF" fill-opacity="0.16" stroke="#A6D0FF" stroke-width="1.5"/>
  <text x="114" y="710" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="18" font-weight="700">STT / TTS / VAD</text>
  <text x="114" y="738" fill="#E7F2FF" font-family="Arial, sans-serif" font-size="15">Cấu hình thoại nền</text>

  <rect x="278" y="674" width="172" height="90" rx="16" fill="#FFFFFF" fill-opacity="0.16" stroke="#A6D0FF" stroke-width="1.5"/>
  <text x="304" y="710" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="18" font-weight="700">API Integration</text>
  <text x="304" y="738" fill="#E7F2FF" font-family="Arial, sans-serif" font-size="15">Cấu hình tích hợp ngoài</text>

  <rect x="468" y="674" width="172" height="90" rx="16" fill="#FFFFFF" fill-opacity="0.16" stroke="#A6D0FF" stroke-width="1.5"/>
  <text x="494" y="710" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="18" font-weight="700">Agent / Handover</text>
  <text x="494" y="738" fill="#E7F2FF" font-family="Arial, sans-serif" font-size="15">Queue, chuyển người thật</text>

  <rect x="658" y="674" width="172" height="90" rx="16" fill="#FFFFFF" fill-opacity="0.16" stroke="#A6D0FF" stroke-width="1.5"/>
  <text x="684" y="710" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="18" font-weight="700">Fallback</text>
  <text x="684" y="738" fill="#E7F2FF" font-family="Arial, sans-serif" font-size="15">Luật an toàn hệ thống</text>

  <rect x="848" y="674" width="172" height="90" rx="16" fill="#FFFFFF" fill-opacity="0.16" stroke="#A6D0FF" stroke-width="1.5"/>
  <text x="874" y="710" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="18" font-weight="700">Numbers / Extension</text>
  <text x="874" y="738" fill="#E7F2FF" font-family="Arial, sans-serif" font-size="15">Đầu số và route thoại</text>

  <rect x="1038" y="674" width="130" height="90" rx="16" fill="#FFFFFF" fill-opacity="0.16" stroke="#A6D0FF" stroke-width="1.5"/>
  <text x="1064" y="710" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="18" font-weight="700">Users</text>
  <text x="1064" y="738" fill="#E7F2FF" font-family="Arial, sans-serif" font-size="15">Tài khoản</text>

  <rect x="1186" y="674" width="126" height="90" rx="16" fill="#FFFFFF" fill-opacity="0.16" stroke="#A6D0FF" stroke-width="1.5"/>
  <text x="1212" y="710" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="18" font-weight="700">Roles</text>
  <text x="1212" y="738" fill="#E7F2FF" font-family="Arial, sans-serif" font-size="15">Phân quyền</text>

  <rect x="56" y="854" width="1288" height="74" rx="20" fill="#F7FAFE" stroke="#C9D6E6" stroke-width="2"/>
  <text x="88" y="900" fill="#1E3A5F" font-family="Arial, sans-serif" font-size="20" font-weight="700">Kết luận cần nhớ</text>
  <text x="308" y="900" fill="#42546B" font-family="Arial, sans-serif" font-size="18">Prototype được tổ chức thành ba lớp: cấu hình bot, thư viện logic/tri thức, và lớp đo vận hành. Người đọc chỉ cần giữ đúng ba lớp này là sẽ không bị rối.</text>

  <defs>
    <linearGradient id="settingsPanel" x1="56" y1="548" x2="1344" y2="824" gradientUnits="userSpaceOnUse">
      <stop stop-color="#154C94"/>
      <stop offset="1" stop-color="#1B7AE0"/>
    </linearGradient>
  </defs>
</svg>
